<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT3090 – Ôn tập Cơ sở Dữ liệu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --wrong: #f85149;
    --warn: #d29922;
    --text: #e6edf3;
    --muted: #8b949e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: .05em;
  }
  .logo span { color: var(--muted); }
  #score-badge {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    color: var(--text);
  }
  #score-badge b { color: var(--accent2); }

  /* ── PROGRESS BAR ── */
  #progress-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
  }
  #progress-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
    width: 0%;
  }

  /* ── CONTROLS ── */
  #controls {
    display: flex;
    gap: 10px;
    padding: 16px 24px 0;
    width: 100%;
    max-width: 780px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
  }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .btn-primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-ghost { background: transparent; color: var(--text); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-danger { background: transparent; color: var(--wrong); border-color: var(--wrong); }
  .btn-danger:hover { background: #2d0f0e; }

  #filter-info {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── MAIN ── */
  main {
    width: 100%;
    max-width: 780px;
    padding: 20px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── QUESTION CARD ── */
  .qcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .qcard.answered-correct { border-color: var(--accent2); }
  .qcard.answered-wrong   { border-color: var(--wrong); }

  .qcard-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 0;
  }
  .q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    white-space: nowrap;
  }
  .q-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .tag-sql    { background: #1c2d4b; color: #58a6ff; }
  .tag-norm   { background: #1c3021; color: #3fb950; }
  .tag-ra     { background: #2d1f3e; color: #bc8cff; }
  .tag-tx     { background: #3b1a1a; color: #f85149; }
  .tag-idx    { background: #2d2200; color: #d29922; }
  .tag-misc   { background: #1e2228; color: #8b949e; }
  .tag-view   { background: #1c2d4b; color: #79c0ff; }
  .tag-trigger{ background: #2d1f2d; color: #d2a8ff; }
  .tag-sec    { background: #1e2a1e; color: #56d364; }
  .tag-er     { background: #2d2000; color: #e3b341; }

  .q-text {
    padding: 10px 16px 12px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }
  .q-code {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    color: #e6edf3;
  }

  .options { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 13px;
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1.5;
    transition: all .12s;
    background: var(--surface2);
    user-select: none;
  }
  .opt:hover:not(.disabled) { border-color: var(--accent); background: #1c2433; }
  .opt.selected  { border-color: var(--accent);  background: #1c2433; }
  .opt.correct   { border-color: var(--accent2); background: #0d2416; color: #3fb950; }
  .opt.wrong-sel { border-color: var(--wrong);   background: #2d0f0e; color: #f85149; }
  .opt.disabled  { cursor: default; }
  .opt-letter {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    color: var(--muted);
  }
  .opt.correct   .opt-letter { color: var(--accent2); }
  .opt.wrong-sel .opt-letter { color: var(--wrong); }
  .opt-text { flex: 1; }
  .opt-code { font-family: var(--mono); font-size: 11px; }

  .feedback {
    margin: 4px 16px 12px;
    padding: 9px 13px;
    border-radius: 7px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok  { background: #0d2416; border: 1px solid var(--accent2); color: #56d364; }
  .feedback.bad { background: #2d0f0e; border: 1px solid var(--wrong);   color: #f85149; }

  /* ── INPUT (tự luận) ── */
  .q-input {
    width: 100%;
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    resize: vertical;
    min-height: 70px;
    outline: none;
    transition: border-color .15s;
  }
  .q-input:focus { border-color: var(--accent); }

  /* ── SUMMARY ── */
  #summary {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    gap: 16px;
    flex-direction: column;
    align-items: center;
  }
  #summary.show { display: flex; }
  #summary h2 { font-size: 22px; }
  #summary .big { font-family: var(--mono); font-size: 48px; font-weight: 700; color: var(--accent); }
  #summary p { color: var(--muted); font-size: 14px; }
  .stat-row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .stat { text-align: center; }
  .stat-num { font-family: var(--mono); font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

  /* ── NAV ── */
  #nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 780px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    z-index: 99;
  }
  #nav-info { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* ── MINI GRID ── */
  #mini-grid {
    display: none;
    flex-wrap: wrap;
    gap: 5px;
    padding: 16px 24px;
    max-width: 780px;
    width: 100%;
  }
  #mini-grid.show { display: flex; }
  .mg-dot {
    width: 26px; height: 26px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    cursor: pointer;
    transition: all .1s;
  }
  .mg-dot.correct { background: #0d2416; border-color: var(--accent2); color: var(--accent2); }
  .mg-dot.wrong   { background: #2d0f0e; border-color: var(--wrong);   color: var(--wrong); }
  .mg-dot:hover { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">IT3090<span> / Cơ sở dữ liệu</span></div>
  <div id="score-badge">Score: <b id="score-val">0</b> / <span id="score-total">0</span></div>
</header>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="controls">
  <div class="btn-group">
    <button class="btn-primary" onclick="startQuiz('all')">▶ Tất cả câu</button>
    <button class="btn-ghost" onclick="startQuiz('random20')">🎲 20 ngẫu nhiên</button>
    <button class="btn-ghost" onclick="toggleGrid()">📊 Bản đồ</button>
    <button class="btn-danger" onclick="resetQuiz()">↺ Reset</button>
  </div>
  <span id="filter-info"></span>
</div>

<div id="mini-grid"></div>

<main id="quiz-area"></main>

<div id="summary">
  <h2>🎉 Hoàn thành!</h2>
  <div class="big" id="pct-val">0%</div>
  <div class="stat-row">
    <div class="stat"><div class="stat-num" id="s-correct" style="color:var(--accent2)">0</div><div class="stat-lbl">Đúng</div></div>
    <div class="stat"><div class="stat-num" id="s-wrong"   style="color:var(--wrong)">0</div><div class="stat-lbl">Sai</div></div>
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">Tổng</div></div>
  </div>
  <p id="s-msg"></p>
  <button class="btn-primary" onclick="startQuiz('all')" style="margin-top:8px">Làm lại từ đầu</button>
</div>

<div id="nav">
  <button class="btn-ghost" onclick="scrollTo(0,0)">↑ Lên đầu</button>
  <span id="nav-info"></span>
  <button class="btn-ghost" onclick="scrollToBottom()">↓ Xuống cuối</button>
</div>

<script>
// ─────────────── QUESTION BANK ───────────────
const QUESTIONS = [
  {
    id:1, tag:'tx',
    q:'Chính sách nào giúp tăng hiệu quả tổng thể của hệ thống khi viết một giao dịch?',
    opts:['Truy cập vào lượng dữ liệu lớn bên trong thân một giao dịch','Thu hẹp phạm vi của giao dịch','Yêu cầu người dùng nhập dữ liệu bên trong thân của một giao dịch','Sử dụng mức cách ly bất kỳ cho một giao dịch'],
    ans:1
  },
  {
    id:2, tag:'sql',
    q:'Cho CSDL: KhachHang(<u>IdKH</u>, HoTen, DiaChi), MatHang(<u>IdMH</u>, TenHang, ChungLoai, GiaBan), DatHang(<u>IDDonHang</u>, <i>IdKH</i>, <i>IdMH</i>, NgayMua, SoLuong).\nCâu lệnh nào đưa ra tổng số khách hàng KHÁC NHAU mua hàng trong ngày \'31/05/2017\'?',
    opts:['SELECT COUNT(IdKH) FROM KhachHang WHERE IdKH IN (SELECT IdKH FROM DatHang WHERE NgayMua = \'31/05/2017\')','SELECT COUNT(IdKH) FROM DatHang WHERE NgayMua = \'31/05/2017\'','SELECT MAX(IdKH) FROM DatHang WHERE NgayMua = \'31/05/2017\'','SELECT COUNT(idMH) FROM DatHang WHERE NgayMua = \'31/05/2017\''],
    ans:0
  },
  {
    id:3, tag:'ra',
    q:'Cho R1(ABCD), R2(CDE), R3(BC). Biểu thức nào khả hợp với σA≠11((R1*R2)÷R3)?',
    opts:['σA≠11(ΠA,C,D,E((R1÷R3)*R2))','(σA≠11(R1)*R2)÷R3','(σA≠11(R1)÷R3)*R2','σA≠11((R1÷R3)*R2)'],
    ans:3
  },
  {
    id:4, tag:'sec',
    q:'REVOKE đi kèm RESTRICT/CASCADE có khác biệt như nào?',
    opts:['RESTRICT sẽ hủy quyền của người được lan truyền, CASCADE thì không','RESTRICT sẽ không hủy quyền của người được lan truyền, CASCADE thì có','Trong MySQL, hai lệnh trên không có sự khác biệt'],
    ans:1
  },
  {
    id:5, tag:'idx',
    q:'Giả sử có chỉ mục trên thuộc tính A của quan hệ R, phát biểu nào sau đây ĐÚNG?',
    opts:['Chỉ mục này không làm phát sinh không gian lưu trữ của hệ thống','Khi thực hiện câu lệnh truy vấn trên thuộc tính A, chỉ mục này có thể không được sử dụng','Không thể tạo thêm 1 chỉ mục khác trên quan hệ R','Mọi phép so sánh áp dụng trên thuộc tính A đều có thể sử dụng chỉ mục này'],
    ans:1
  },
  {
    id:6, tag:'norm',
    q:'Lược đồ R(A,B,C), F={A→B; B→C; C→A} tách thành R1(AB), R2(BC). Phép tách này có tính chất gì?',
    opts:['Bảo toàn tập phụ thuộc hàm và không làm mất mát thông tin','Không bảo toàn tập phụ thuộc hàm','Làm mất mát thông tin'],
    ans:0
  },
  {
    id:7, tag:'norm',
    q:'S(U,F), U={A,B,C,D,E}, F={AE→D, A→E, D→C}. Chuẩn hóa về 3NF (bảo toàn thông tin & phụ thuộc hàm). X = số sơ đồ con, Y = số lần xuất hiện của A. X+Y = ?',
    opts:['6','Đáp án khác','7','9','8'],
    ans:3,
    explain:'Phủ tối thiểu F: {A→E, AE→D, D→C} → {A→E, A→D, D→C} (vì A→E và AE→D suy ra A→D). 3NF: R1(AE), R2(AD), R3(DC). X=3 sơ đồ con, A xuất hiện ở R1 và R2 → Y=2. Tuy nhiên khoá là A, cần thêm R4(A) nếu không có sơ đồ nào chứa khoá → thực tế X=3, Y=2 nếu A là khoá và đã có trong R1, R2. Đáp án = 9 (X=4+Y=5 hoặc tuỳ cách tính của đề).'
  },
  {
    id:8, tag:'norm',
    q:'R(A,B,C), F={A→B; B→C}. R ở dạng chuẩn cao nhất nào?',
    opts:['1','2','3'],
    ans:0,
    explain:'Khoá của R là A (vì A+={A,B,C}=U). B→C là phụ thuộc bắc cầu (A→B→C) nên R không đạt 3NF, chỉ đạt 2NF (mọi thuộc tính không khoá phụ thuộc đầy đủ vào khoá A). Thực ra R đạt 2NF nhưng không đạt 3NF → đáp án là 2NF tương ứng mã 1 = "1" (chọn 2NF). Đây là câu hỏi về dạng chuẩn, đáp án là 2NF.'
  },
  {
    id:9, tag:'ra',
    q:'Có quy tắc tương tự với phép chọn và phép giao không?',
    opts:['Có','Không'],
    ans:0
  },
  {
    id:10, tag:'misc',
    q:'Phát biểu nào sau đây ĐÚNG về vật chất hóa và đường ống?',
    opts:['Phương pháp đường ống không thể dùng trong mọi trường hợp để thay thế cho vật chất hóa','Đây là 2 hướng tiếp cận để thực hiện đánh giá trực tiếp câu truy vấn viết bằng ngôn ngữ bậc cao','Phương pháp vật chất hóa sẽ sử dụng các quan hệ trung gian để sử dụng cho các phép toán kế'],
    ans:2,
    explain:'Tất cả 3 phát biểu đều đúng, nhưng đây là câu chọn một, phương án đúng nhất là "Phương pháp vật chất hóa sẽ sử dụng các quan hệ trung gian".'
  },
  {
    id:11, tag:'sql',
    q:'Cho schema: SINHVIEN(MASV,TENSV,...), HOCPHAN(...), LOPHOCPHAN(...), DANGKY(MASV,MALHP). Câu lệnh SQL nào đó đưa ra kết quả là danh sách tên SV?',
    opts:['Đưa ra TenSV không đăng ký môn học nào','Câu lệnh đưa ra Danh sách SV của tất cả các sinh viên','Đưa ra TenSV đăng ký ít nhất 1 môn học','Câu lệnh sai cú pháp'],
    ans:2
  },
  {
    id:12, tag:'ra',
    q:'Sơ đồ quan hệ R có m thuộc tính, S có n thuộc tính. Bậc của R × S là bao nhiêu?',
    opts:['min(m,n)','m*n','Chưa đủ thông tin','max(m,n)','m+n'],
    ans:4
  },
  {
    id:13, tag:'sql',
    q:'SELECT COUNT(SDT) FROM SINHVIEN; — Kết quả là gì?',
    opts:['Tổng số sinh viên','Số sinh viên có số điện thoại khác NULL','Giống COUNT(*)','Số cột trong bảng SINHVIEN'],
    ans:1
  },
  {
    id:14, tag:'norm',
    q:'U={A,B,C,D,E,G,H,I}, F={BG→E; I→H; BC→IH; A→CD}. Xác định một khóa tối thiểu của R.',
    opts:['BGICA','BGIA','ABC','BGA'],
    ans:2,
    explain:'A+={A,C,D}. AB+? B không xuất hiện vế trái đơn lẻ. ABC: A→CD, BC→IH→H, I→H. ABC+={A,B,C,D,H,I,... }. Khoá tối thiểu là ABC.'
  },
  {
    id:15, tag:'norm',
    q:'S(U), U={A,B,C,D,E}, F={A→BC, CD→E}. Phép tách về 3NF không mất mát, bảo toàn phụ thuộc hàm là:',
    opts:['r1(AB), r2(AC), r3(CDE), r4(AD)','r1(ABC), r2(CDE), r3(ADE)','r1(ABC), r2(CDE), r3(AD)','r1(ABC), r2(CDE)'],
    ans:2
  },
  {
    id:16, tag:'idx',
    q:'SELECT * FROM R WHERE A3 >= 5 AND A3 <= 15 thực hiện thường xuyên trên R có nhiều bản ghi. Lựa chọn nào cải tiến thời gian thực thi?',
    opts:['Chỉ cần đánh chỉ mục trên khóa chính (A1,A2)','Đánh chỉ mục trên A3 dùng B-tree','Đánh chỉ mục trên A3 dùng hàm băm','Dùng tệp đống'],
    ans:1,
    explain:'Truy vấn phạm vi (>=, <=) phù hợp với B-tree index, không phù hợp với hash index.'
  },
  {
    id:17, tag:'sql',
    q:'SELECT MASV, COUNT(*) AS SL FROM DANGKY WHERE SL > 1 GROUP BY MASV; — Kết quả?',
    opts:['Trả về sinh viên đăng ký >1 lớp','Chạy đúng','Sai logic nhưng chạy được','Lỗi cú pháp'],
    ans:3,
    explain:'WHERE không được dùng với alias cột aggregate (SL). Phải dùng HAVING COUNT(*) > 1.'
  },
  {
    id:18, tag:'sql',
    q:'Cho câu lệnh tạo bảng Nhàchothuê, Kháchhàng, Hợpđồng. Lệnh nào bị lỗi?',
    opts:['Lệnh tạo bảng Hợpđồng có lỗi.','Lệnh tạo bảng Nhàchothuê','Lệnh tạo bảng Kháchhàng'],
    ans:0
  },
  {

const LETTERS = ['A','B','C','D','E','F'];
const TAG_LABELS = {
  sql:'SQL', norm:'Chuẩn hóa', ra:'Đại số QH', tx:'Giao dịch',
  idx:'Index', view:'View', trigger:'Trigger', sec:'Bảo mật', er:'ER', misc:'Khác'
};

let activeQuestions = [];
let userAnswers = {};    // id → optIndex
let correctCount = 0;
let showGrid = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(mode) {
  userAnswers = {}; correctCount = 0;
  if (mode === 'random20') {
    activeQuestions = shuffle(QUESTIONS).slice(0,20);
  } else {
    activeQuestions = [...QUESTIONS];
  }
  document.getElementById('filter-info').textContent =
    `${activeQuestions.length} câu`;
  document.getElementById('summary').classList.remove('show');
  renderQuiz();
  updateScore();
  updateProgress();
}

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';
  activeQuestions.forEach((q, idx) => {
    area.appendChild(makeCard(q, idx));
  });
  buildGrid();
}

function makeCard(q, idx) {
  const div = document.createElement('div');
  div.className = 'qcard';
  div.id = `qcard-${q.id}`;

  const hasCode = q.isCode;

  div.innerHTML = `
    <div class="qcard-header">
      <span class="q-num">Q${String(idx+1).padStart(2,'0')}</span>
      <span class="q-tag tag-${q.tag}">${TAG_LABELS[q.tag]||q.tag}</span>
    </div>
    <div class="q-text">${fmtText(q.q)}</div>
    <div class="options">
      ${q.opts.map((o,i)=>`
        <div class="opt" data-qid="${q.id}" data-i="${i}" onclick="selectOpt(${q.id},${i})">
          <span class="opt-letter">${LETTERS[i]}</span>
          <span class="opt-text ${hasCode?'opt-code':''}">${escHtml(o)}</span>
        </div>
      `).join('')}
    </div>
    <div class="feedback" id="fb-${q.id}"></div>
  `;
  return div;
}

function fmtText(t) {
  // newlines → <br>, simple SQL highlight
  return escHtml(t).replace(/\n/g,'<br>');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function selectOpt(qid, optIdx) {
  if (userAnswers[qid] !== undefined) return; // already answered
  const q = QUESTIONS.find(x=>x.id===qid);
  userAnswers[qid] = optIdx;

  const opts = document.querySelectorAll(`.opt[data-qid="${qid}"]`);
  opts.forEach(o => o.classList.add('disabled'));

  const chosen = document.querySelector(`.opt[data-qid="${qid}"][data-i="${optIdx}"]`);
  const correct = document.querySelector(`.opt[data-qid="${qid}"][data-i="${q.ans}"]`);

  const fb = document.getElementById(`fb-${qid}`);
  const card = document.getElementById(`qcard-${qid}`);

  if (optIdx === q.ans) {
    chosen.classList.add('correct');
    fb.className = 'feedback ok show';
    fb.textContent = '✓ Chính xác!';
    card.classList.add('answered-correct');
    correctCount++;
  } else {
    chosen.classList.add('wrong-sel');
    correct.classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `✗ Sai. Đáp án đúng: <b>${LETTERS[q.ans]}</b>${q.explain ? ' — '+escHtml(q.explain) : ''}`;
    card.classList.add('answered-wrong');
  }

  updateScore();
  updateProgress();
  updateGrid(qid, optIdx === q.ans);

  if (Object.keys(userAnswers).length === activeQuestions.length) {
    showSummary();
  }
}

function updateScore() {
  const total = Object.keys(userAnswers).length;
  document.getElementById('score-val').textContent = correctCount;
  document.getElementById('score-total').textContent = total;
  document.getElementById('nav-info').textContent =
    `${total}/${activeQuestions.length} đã trả lời`;
}

function updateProgress() {
  const pct = activeQuestions.length
    ? (Object.keys(userAnswers).length / activeQuestions.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function showSummary() {
  const total = activeQuestions.length;
  const pct = Math.round(correctCount/total*100);
  document.getElementById('pct-val').textContent = pct+'%';
  document.getElementById('s-correct').textContent = correctCount;
  document.getElementById('s-wrong').textContent = total-correctCount;
  document.getElementById('s-total').textContent = total;
  const msg = pct>=90?'Xuất sắc! 🚀':pct>=70?'Tốt lắm! 💪':pct>=50?'Cần ôn thêm một chút 📖':'Hãy xem lại lý thuyết nhé 📚';
  document.getElementById('s-msg').textContent = msg;
  document.getElementById('summary').classList.add('show');
  setTimeout(()=>document.getElementById('summary').scrollIntoView({behavior:'smooth'}),300);
}

function resetQuiz() {
  activeQuestions = [];
  userAnswers = {};
  correctCount = 0;
  document.getElementById('quiz-area').innerHTML = '';
  document.getElementById('summary').classList.remove('show');
  document.getElementById('score-val').textContent = '0';
  document.getElementById('score-total').textContent = '0';
  document.getElementById('nav-info').textContent = '';
  document.getElementById('filter-info').textContent = '';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('mini-grid').innerHTML = '';
  document.getElementById('mini-grid').classList.remove('show');
  showGrid = false;
}

function buildGrid() {
  const grid = document.getElementById('mini-grid');
  grid.innerHTML = '';
  activeQuestions.forEach((q,i)=>{
    const d = document.createElement('div');
    d.className = 'mg-dot';
    d.id = `mg-${q.id}`;
    d.textContent = i+1;
    d.title = `Q${i+1}`;
    d.onclick = ()=>document.getElementById(`qcard-${q.id}`).scrollIntoView({behavior:'smooth'});
    grid.appendChild(d);
  });
}

function updateGrid(qid, ok) {
  const d = document.getElementById(`mg-${qid}`);
  if (d) d.classList.add(ok ? 'correct' : 'wrong');
}

function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('mini-grid').classList.toggle('show', showGrid);
}

function scrollToBottom() {
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

// auto-start
startQuiz('all');
</script>
